name: Backend CI

on:
  push:
    paths:
      - "api/**"
      - "scrapper_mlb/**"
      - "database/**"
      - "tests/**"
      - "requirements.txt"
      - "pytest.ini"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "api/**"
      - "scrapper_mlb/**"
      - "database/**"
      - "tests/**"
      - "requirements.txt"
      - "pytest.ini"
      - ".github/workflows/backend.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: promoly_test
        ports:
          - 5544:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5544/promoly_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5544/promoly_test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: pytest

      - name: Run API integration tests (PostgreSQL)
        run: pytest -m api --no-cov

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
